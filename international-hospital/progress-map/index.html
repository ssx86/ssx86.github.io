<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>互联网医院小程序产品通路图</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./progress-map.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Internet Hospital Mini Program</p>
      <h1>产品页面通路星图</h1>
      <p class="subtitle">所有节点来自 DOCS/pages/**/*.png.txt；所有关系线来自 DEV.md 中的 JUMPTO / SWITCHTAB / wx.switchTab。已验证通路发光，未验证节点保持暗态。</p>
    </div>
    <div class="toolbar" aria-label="图谱筛选">
      <input id="searchInput" type="search" placeholder="搜索页面、路由、状态">
      <select id="statusFilter" aria-label="状态筛选">
        <option value="all">全部状态</option>
        <option value="verified">已验证</option>
        <option value="partial">待复验</option>
        <option value="blocked">阻塞</option>
        <option value="documented">未验证</option>
        <option value="dev-only">缺少 png.txt</option>
        <option value="missing-doc">缺少文档目标</option>
      </select>
    </div>
  </header>

  <main>
    <section class="summary" id="summary"></section>

    <section class="legend" aria-label="状态说明">
      <span><i class="dot verified"></i>已通过 MCP 自然路径并读取 console</span>
      <span><i class="dot partial"></i>已定位/修复，等待运行时复验</span>
      <span><i class="dot blocked"></i>数据条件、变更风险或工具通道阻塞</span>
      <span><i class="dot documented"></i>产品文档已收录，尚未验证</span>
      <span><i class="dot dev-only"></i>只有 DEV.md，缺少 png.txt 状态图</span>
      <span><i class="dot missing-doc"></i>跳转提到但缺少 png.txt</span>
    </section>

    <section class="graph-shell" aria-label="产品页面通路图">
      <div class="graph-actions">
        <button id="resetView" type="button">重置高亮</button>
        <span id="graphMeta"></span>
      </div>
      <div class="graph-scroll">
        <div id="graphStage" class="graph-stage">
          <svg id="edgeLayer" class="edge-layer"></svg>
          <div id="laneLayer" class="lane-layer"></div>
          <div id="nodeLayer" class="node-layer"></div>
        </div>
      </div>
    </section>

    <aside class="detail-panel" id="detailPanel">
      <h2>节点详情</h2>
      <p>点击任一节点查看文档路径、注册路由、入线和出线。</p>
    </aside>
  </main>

  <script type="module" src="./progress-map.js"></script>
</body>
</html>
